<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BROTHER BARBERSHOP | Gestión</title>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>
  <style>
    :root { --bg: #f4f4f4; --card: #ffffff; --text: #1a1a1a; --accent: #d32f2f; --dark: #000000; --wa: #25d366; --radius: 12px; }
    * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
    body { margin: 0; background: var(--bg); color: var(--text); padding: 15px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--dark); border-radius: var(--radius); margin-bottom: 25px; color: white; border-bottom: 4px solid var(--accent); }
    .nav-btns { display: none; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding: 5px; }
    .nav-btn { background: white; border: 1px solid var(--dark); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
    .nav-btn.active { background: var(--dark); color: white; }
    .screen { display: none; } .screen.active { display: block; }
    .main-grid { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }
    .card { background: var(--card); padding: 20px; border-radius: var(--radius); box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #ddd; margin-bottom: 20px; }
    .item-card { background: white; padding: 12px; border-radius: 10px; border-left: 5px solid var(--dark); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .img-prev { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; background: #eee; }
    .time-slot { background: white; border: 1px solid #ddd; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; }
    .time-slot.active { background: var(--accent); color: white; border-color: var(--accent); }
    
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
    .service-card { background: white; border-radius: 12px; border: 1px solid #ddd; overflow: hidden; cursor: pointer; text-align: center; position: relative; }
    .service-card img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .service-card p { margin: 8px 0; font-size: 14px; }
    .service-card.selected { border: 4px solid var(--accent); transform: scale(1.02); }
    .zoom-hint { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.5); color: white; padding: 4px; border-radius: 50%; font-size: 12px; }

    #modal-view { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; flex-direction: column; padding: 20px; }
    #modal-view img { max-width: 100%; max-height: 70vh; border-radius: 10px; border: 3px solid white; }
    #modal-view h2 { color: white; margin: 15px 0; }
    .modal-actions { display: flex; gap: 15px; width: 100%; max-width: 400px; }

    input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-top: 8px; }
    .btn-wa { background: var(--wa); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; font-size: 22px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    .btn-wa:hover { transform: scale(1.1); }
    @media (max-width: 850px) { .main-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="modal-view">
    <img id="modal-img" src="" alt="Vista previa">
    <h2 id="modal-name-text"></h2>
    <div class="modal-actions">
      <button onclick="closeModal()" style="flex:1; padding:15px; border-radius:10px; border:none; background:#555; color:white; font-weight:bold;">CERRAR</button>
      <button id="confirm-btn" style="flex:1; padding:15px; border-radius:10px; border:none; background:var(--accent); color:white; font-weight:bold;">ELEGIR ESTE</button>
    </div>
  </div>

  <div id="auth-overlay" style="position:fixed; inset:0; background:var(--dark); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:white; padding:30px; border-radius:var(--radius); width:100%; max-width:400px; text-align:center;">
      <h2 style="margin-bottom:20px;">BROTHER BARBERSHOP</h2>
      <input type="text" id="u-name" placeholder="Tu Nombre">
      <input type="text" id="u-phone" placeholder="WhatsApp (Clientes)">
      <input type="password" id="u-pass" placeholder="Contraseña (Solo Barberos)">
      <button onclick="handleLogin()" style="width:100%; padding:15px; margin-top:15px; background:var(--dark); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">ACCEDER</button>
    </div>
  </div>

  <div class="wrap">
    <header>
      <div><h1 style="margin:0; font-size:18px;">Brother Barbershop</h1><small id="user-display"></small></div>
      <button onclick="location.reload()" style="background:white; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; cursor:pointer;">Salir</button>
    </header>

    <div class="nav-btns" id="nav-bar">
      <button class="nav-btn active" onclick="showScreen('home', event)">RESERVAR</button>
      <button class="nav-btn" onclick="showScreen('agenda', event)" id="nav-agenda" style="display:none;">AGENDA</button>
      <button class="nav-btn" onclick="showScreen('clients', event)" id="nav-crm" style="display:none;">CRM</button>
      <button class="nav-btn" onclick="showScreen('admin', event)" id="nav-admin" style="display:none;">ADMIN</button>
    </div>

    <div id="screen-home" class="screen active">
      <div id="mis-citas-container"></div>
      <div class="main-grid">
        <div class="left">
          <h3>1. Elige Barbero</h3>
          <div style="display:flex; gap:10px; margin-bottom:20px;" id="barber-selectors">
            <div class="nav-btn" id="b-Chino" style="flex:1; text-align:center;" onclick="setBarber('Chino', '50377543123')">CHINO</div>
            <div class="nav-btn" id="b-Francisco" style="flex:1; text-align:center;" onclick="setBarber('Francisco', '50375947426')">FRANCISCO</div>
          </div>
          <h3>2. Elige Estilo (Click para ampliar)</h3>
          <div class="services-grid" id="services-render"></div>
        </div>
        <aside>
          <div class="card">
            <h3>Fecha y Hora</h3>
            <div id="admin-manual-inputs" style="display:none; background:#eee; padding:10px; border-radius:8px; margin-bottom:10px;">
              <input type="text" id="manual-name" placeholder="Nombre Cliente">
              <input type="text" id="manual-phone" placeholder="WhatsApp">
            </div>
            <input type="date" id="res-date" onchange="renderTimeSlots()">
            <div id="time-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px;"></div>
            <button class="nav-btn" style="width:100%; margin-top:15px; background:var(--dark); color:white;" onclick="checkAndSend()">AGENDAR CITA</button>
          </div>
        </aside>
      </div>
    </div>

    <div id="screen-agenda" class="screen">
      <div class="card"><h3>Hoy: <span id="agenda-date"></span></h3><div id="agenda-list"></div></div>
    </div>

    <div id="screen-clients" class="screen">
      <div class="card"><h3>CLIENTES PARA CONTACTAR</h3><div id="crm-list"></div></div>
    </div>

    <div id="screen-admin" class="screen">
      <div class="card">
        <h3>Disponibilidad de Barberos</h3>
        <div style="display:flex; gap:10px;">
          <button class="nav-btn" onclick="toggleBarber('Chino')" id="t-Chino">CHINO</button>
          <button class="nav-btn" onclick="toggleBarber('Francisco')" id="t-Francisco">FRANCISCO</button>
        </div>
      </div>
      <div class="card">
        <h3>Subir Nuevo Corte</h3>
        <input type="text" id="new-name" placeholder="Nombre del estilo">
        <input type="file" id="new-file" accept="image/*">
        <button class="nav-btn" id="btn-upload" style="width:100%; margin-top:10px; background:green; color:white;" onclick="uploadCorte()">GUARDAR Y SUBIR</button>
      </div>
      <div class="card"><h3>Gestionar Cortes</h3><div id="admin-list-cortes"></div></div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyD_nyKvNf1nO7ivZncGZWcI4Ny-J9ACBTk",
      authDomain: "brotherbarbershop-72776.firebaseapp.com",
      projectId: "brotherbarbershop-72776",
      storageBucket: "brotherbarbershop-72776.firebasestorage.app",
      databaseURL: "https://brotherbarbershop-72776-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();

    let user = {}, selectedBarber = {}, selectedService = null, selectedTime = null;
    let allReservas = {}, allCortes = {}, barberStatus = { Chino: true, Francisco: true };

    function handleLogin() {
      const n = document.getElementById('u-name').value.trim();
      const p = document.getElementById('u-phone').value.trim();
      const pass = document.getElementById('u-pass').value.trim();
      if(!n) return alert("Ingresa nombre");

      if(n.toLowerCase() === 'frank' && pass === 'admin2026') user = { name: 'Admin', role: 'admin' };
      else if(n.toLowerCase() === 'chino' && pass === 'chino123') user = { name: 'Chino', role: 'barber', phone: '50377543123' };
      else if(n.toLowerCase() === 'fran' && pass === 'fran123') user = { name: 'Francisco', role: 'barber', phone: '50375947426' };
      else { if(!p) return alert("Ingresa WhatsApp"); user = { name: n, role: 'client', phone: p }; }

      if(user.role !== 'client') {
        document.getElementById('nav-agenda').style.display = 'block';
        document.getElementById('nav-crm').style.display = 'block';
        document.getElementById('admin-manual-inputs').style.display = 'block';
        if(user.role === 'admin') document.getElementById('nav-admin').style.display = 'block';
      }
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('user-display').innerText = "Hola, " + user.name;
      document.getElementById('nav-bar').style.display = 'flex';
      loadData();
    }

    function loadData() {
      db.ref('cortes').on('value', s => { allCortes = s.val() || {}; renderServices(); renderAdminCortes(); });
      db.ref('reservas').on('value', s => { allReservas = s.val() || {}; renderAll(); });
      db.ref('barberos').on('value', s => { barberStatus = s.val() || { Chino: true, Francisco: true }; updateBarberUI(); });
    }

    function renderAll() { renderAgenda(); renderMisCitas(); renderTimeSlots(); renderCRM(); }

    function format12h(t) {
      let [h, m] = t.split(':');
      return (h % 12 || 12) + ':' + m + (h >= 12 ? ' PM' : ' AM');
    }

    function openPreview(id, name, img) {
        const modal = document.getElementById('modal-view');
        document.getElementById('modal-img').src = img;
        document.getElementById('modal-name-text').innerText = name;
        document.getElementById('confirm-btn').onclick = () => {
            selectService(id, name, img);
            closeModal();
        };
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal-view').style.display = 'none';
    }

    function selectService(id, name, img) {
        selectedService = {id, name, img};
        document.querySelectorAll('.service-card').forEach(c => c.classList.remove('selected'));
        const el = document.getElementById('svc-' + id);
        if(el) el.classList.add('selected');
    }

    // CORRECCIÓN CLAVE AQUÍ:
    async function uploadCorte() {
      const fileInput = document.getElementById('new-file');
      const file = fileInput.files[0];
      const name = document.getElementById('new-name').value.trim();
      const btn = document.getElementById('btn-upload');

      if(!file || !name) return alert("Sube foto y pon nombre");
      
      btn.disabled = true;
      btn.innerText = "Subiendo...";

      try {
        const ref = storage.ref('cortes/' + Date.now() + "_" + file.name);
        const snap = await ref.put(file);
        const url = await snap.ref.getDownloadURL();
        
        await db.ref('cortes').push({ name: name, img: url });
        
        alert("¡Estilo guardado!");
        document.getElementById('new-name').value = "";
        fileInput.value = "";
      } catch (e) {
        console.error(e);
        alert("Error al subir imagen");
      } finally {
        btn.disabled = false;
        btn.innerText = "GUARDAR Y SUBIR";
      }
    }

    function renderServices() {
      document.getElementById('services-render').innerHTML = Object.keys(allCortes).map(k => `
        <div class="service-card" id="svc-${k}" onclick="openPreview('${k}','${allCortes[k].name}','${allCortes[k].img}')">
          <div class="zoom-hint">🔍</div>
          <img src="${allCortes[k].img}"><p><b>${allCortes[k].name}</b></p>
        </div>`).join('');
    }

    function setBarber(n, p) {
      if(!barberStatus[n]) return alert("🚨 " + n + " está libre hoy.");
      selectedBarber = {name:n, phone:p};
      document.querySelectorAll('#barber-selectors .nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('b-' + n).classList.add('active');
      renderTimeSlots();
    }

    function renderMisCitas() {
      const container = document.getElementById('mis-citas-container'); if(user.role !== 'client') return;
      const cita = Object.keys(allReservas).map(k => ({...allReservas[k], k})).find(r => r.phone === user.phone && r.status !== 'eliminado');
      container.innerHTML = cita ? `
        <div class="card" style="border: 2px solid var(--accent);">
          <h3 style="color:var(--accent); margin:0;">Tu Cita Actual:</h3>
          <p>${cita.fecha} a las ${format12h(cita.hora)} con ${cita.barbero}</p>
          <button class="nav-btn" style="background:var(--accent); color:white; width:100%;" onclick="db.ref('reservas/${cita.k}').update({status:'eliminado'})">CANCELAR PARA REAGENDAR</button>
        </div>` : "";
    }

    function checkAndSend() {
      const d = document.getElementById('res-date').value;
      if(!selectedService || !selectedTime || !d) return alert("Faltan datos de cita");
      let fN = user.name, fP = user.phone, manual = (user.role !== 'client');
      if(manual) { fN = document.getElementById('manual-name').value; fP = document.getElementById('manual-phone').value; }
      if(!fN || !fP) return alert("Nombre y WhatsApp requeridos");

      const r = { barbero: selectedBarber.name, cliente: fN, phone: fP, corte: selectedService.name, fecha: d, hora: selectedTime, status: 'pendiente', timestamp: Date.now() };
      db.ref('reservas').push().set(r).then(() => {
        const h12 = format12h(selectedTime);
        const target = manual ? fP : selectedBarber.phone;
        const msg = `💈 *BROTHER BARBERSHOP* 💈\n\nReserva confirmada:\n👤 *Cliente:* ${fN}\n✂️ *Corte:* ${selectedService.name}\n📅 *Fecha:* ${d}\n⏰ *Hora:* ${h12}\n💈 *Barbero:* ${selectedBarber.name}`;
        window.open(`https://wa.me/${target.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
      });
    }

    function renderAgenda() {
      const list = document.getElementById('agenda-list'), hoy = new Date().toISOString().split("T")[0];
      document.getElementById('agenda-date').innerText = hoy;
      const citas = Object.keys(allReservas).map(k => ({...allReservas[k], k})).filter(r => (user.role === 'admin' || r.barbero === user.name) && r.fecha === hoy && r.status !== 'eliminado');
      list.innerHTML = citas.sort((a,b)=> a.hora.localeCompare(b.hora)).map(r => {
        const cData = Object.values(allCortes).find(c => c.name === r.corte);
        return `
        <div class="item-card">
          <img src="${cData ? cData.img : ''}" class="img-prev">
          <div style="flex:1"><strong>${format12h(r.hora)}</strong> - ${r.cliente}</div>
          <div style="display:flex; gap:8px;">
            <a class="btn-wa" onclick="window.open('https://wa.me/${r.phone.replace(/\D/g,'')}?text=Hola *${r.cliente}*, te recordamos tu cita hoy a las ${format12h(r.hora)}.')">📲</a>
            <button onclick="db.ref('reservas/${r.k}').update({status:'confirmada'})" style="border:none; background:green; color:white; border-radius:5px; padding:5px 10px; cursor:pointer;">✅</button>
            <button onclick="db.ref('reservas/${r.k}').update({status:'eliminado'})" style="border:none; background:red; color:white; border-radius:5px; padding:5px 10px; cursor:pointer;">X</button>
          </div>
        </div>`;
      }).join('') || "Sin citas para hoy.";
    }

    function renderCRM() {
      const div = document.getElementById('crm-list'); if(!div) return;
      const clis = {};
      Object.values(allReservas).forEach(r => {
        if(user.role === 'admin' || r.barbero === user.name) {
          if(!clis[r.phone] || r.timestamp > clis[r.phone].ts) {
            const cData = Object.values(allCortes).find(c => c.name === r.corte);
            clis[r.phone] = { n: r.cliente, p: r.phone, ts: r.timestamp, f: r.fecha, corte: r.corte, img: cData ? cData.img : '' };
          }
        }
      });
      div.innerHTML = Object.values(clis).map(c => `
        <div class="item-card">
          <img src="${c.img}" class="img-prev">
          <div style="flex:1"><b>${c.n}</b><br><small>${c.corte} (${c.f})</small></div>
          <a class="btn-wa" onclick="window.open('https://wa.me/${c.p.replace(/\D/g,'')}?text=Hola *${c.n}*, te saludamos de *Brother Barbershop*!')">📲</a>
        </div>`).join('');
    }

    function renderTimeSlots() {
      const grid = document.getElementById('time-grid'), d = document.getElementById('res-date').value;
      grid.innerHTML = ""; if(!d || !selectedBarber.name) return;
      const ahora = new Date(), hoy = ahora.toISOString().split('T')[0];
      const ocupadas = Object.values(allReservas).filter(r => r.barbero === selectedBarber.name && r.fecha === d && r.status !== 'eliminado').map(r => r.hora);
      for(let h = 8; h <= 17; h++) {
        for(let m of ['00', '45']) {
          if(h === 17 && m === '45') continue;
          let t24 = (h < 10 ? '0'+h : h) + ':' + m;
          if(ocupadas.includes(t24)) continue;
          if(d === hoy && (h < ahora.getHours() || (h === ahora.getHours() && Number(m) <= ahora.getMinutes()))) continue;
          let btn = document.createElement('div'); btn.className = 'time-slot'; btn.innerText = format12h(t24);
          btn.onclick = (e) => { selectedTime = t24; document.querySelectorAll('.time-slot').forEach(x => x.classList.remove('active')); e.target.classList.add('active'); };
          grid.appendChild(btn);
        }
      }
    }

    function toggleBarber(b) { db.ref('barberos/' + b).set(!barberStatus[b]); }
    function updateBarberUI() {
      ['Chino', 'Francisco'].forEach(b => {
        const btn = document.getElementById('t-' + b); if(btn) { 
            btn.innerText = b + (barberStatus[b] ? ' (Activo)' : ' (Libre)'); 
            btn.style.background = barberStatus[b] ? 'green' : 'gray'; 
        }
        const sel = document.getElementById('b-' + b); if(sel) { 
            sel.style.opacity = barberStatus[b] ? '1' : '0.4'; 
            sel.style.border = barberStatus[b] ? '' : '1px dashed red';
        }
      });
    }

    function renderAdminCortes() {
      const div = document.getElementById('admin-list-cortes'); if(!div) return;
      div.innerHTML = Object.keys(allCortes).map(k => `
        <div class="item-card">
          <img src="${allCortes[k].img}" class="img-prev">
          <span>${allCortes[k].name}</span>
          <button onclick="if(confirm('¿Borrar?')) db.ref('cortes/${k}').remove()" style="background:red; color:white; border:none; padding:5px; border-radius:5px; cursor:pointer;">Borrar</button>
        </div>`).join('');
    }

    function showScreen(scr, e) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
        document.querySelectorAll('.nav-btns .nav-btn').forEach(b => b.classList.remove('active')); 
        document.getElementById('screen-' + scr).classList.add('active'); 
        e.target.classList.add('active'); 
    }
    document.getElementById('res-date').min = new Date().toISOString().split("T")[0];
  </script>
</body>
</html>
